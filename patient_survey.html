<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Survey Analysis — Santosh Portfolio</title>
<link rel="icon" href="images/facicon.png" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/2fb5adb165.js" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

:root{
  --red:#e8364a;
  --red-dim:rgba(232,54,74,0.12);
  --bg:#080a0f;
  --bg2:#0f1117;
  --surface:#1a1f2e;
  --border:rgba(255,255,255,0.07);
  --border-red:rgba(232,54,74,0.3);
  --text:#f0f2f7;
  --text-muted:#8b91a8;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans',sans-serif;
  --radius:12px;
  --radius-lg:18px;
  --nav-h:72px;
  --transition:0.35s cubic-bezier(0.4,0,0.2,1);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  line-height:1.65;
  min-height:100vh;
}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:99px;}

nav{
  position:sticky;top:0;height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5%;
  background:rgba(8,10,15,0.9);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);z-index:1000;
}

.logo{
  width:44px;height:44px;border-radius:50%;object-fit:cover;
  border:1.5px solid var(--border-red);
  animation:rotateY 10s infinite;transform-style:preserve-3d;
}
@keyframes rotateY{
  0%{transform:rotateY(-100deg);}
  50%{transform:rotateY(400deg);}
  100%{transform:rotateY(-100deg);}
}

nav ul{display:flex;align-items:center;gap:4px;list-style:none;}
nav ul li a{
  color:var(--text-muted);text-decoration:none;font-size:13.5px;
  font-weight:500;padding:6px 12px;border-radius:6px;transition:var(--transition);
}
nav ul li a:hover{color:var(--text);background:var(--surface);}
nav .fa-bars, nav .fa-circle-xmark{display:none;font-size:22px;cursor:pointer;color:var(--text);}

.container{max-width:1200px;margin:0 auto;padding:0 5%;}

.page-header{padding:64px 0 40px;text-align:center;}
.section-label{
  display:inline-flex;align-items:center;gap:10px;
  font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--red);margin-bottom:16px;
}
.section-label::before{content:'';display:block;width:28px;height:1.5px;background:var(--red);border-radius:99px;}
.page-header h1{
  font-family:var(--font-display);font-size:clamp(32px,5vw,52px);
  font-weight:500;letter-spacing:-0.02em;line-height:1.1;
  color:var(--text);margin-bottom:14px;
}
.hint-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:99px;padding:6px 16px;font-size:12.5px;
  color:var(--text-muted);margin-top:16px;
}
.hint-badge i{color:var(--red);font-size:12px;}

.section-divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
  margin:0 0 48px;
}

.TableauWrapper{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
  margin-bottom:56px;transition:var(--transition);
  opacity:0;transform:translateY(20px);
  animation:fadeUp 0.6s ease forwards;
}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
.TableauWrapper:hover{border-color:var(--border-red);}

.TableauWrapper a{display:block;text-decoration:none;position:relative;}
.TableauWrapper img{
  width:100%;height:580px;object-fit:cover;object-position:top;
  display:block;filter:brightness(0.9);transition:var(--transition);
}
.TableauWrapper a:hover img{filter:brightness(1);}
.TableauWrapper a::after{
  content:'Open Interactive Dashboard';
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-body);font-size:15px;font-weight:600;
  color:#fff;letter-spacing:0.04em;
  background:rgba(232,54,74,0);transition:var(--transition);pointer-events:none;
}
.TableauWrapper a:hover::after{background:rgba(232,54,74,0.18);}

.dashboard-cta{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:16px 20px;border-top:1px solid var(--border);
  font-size:13.5px;color:var(--text-muted);
}
.dashboard-cta i{font-size:13px;color:var(--red);}

.btn-back{
  display:block;width:fit-content;margin:0 auto 80px;
  border:1px solid var(--border-red);color:var(--red);
  padding:12px 32px;border-radius:var(--radius);
  text-decoration:none;font-size:14px;font-weight:600;
  letter-spacing:0.04em;background:var(--red-dim);
  transition:var(--transition);font-family:var(--font-body);
}
.btn-back:hover{background:var(--red);color:#fff;}

@media(max-width:640px){
  :root{--nav-h:60px;}
  nav ul{
    flex-direction:column;align-items:flex-start;
    background:var(--bg2);border-left:3px solid var(--red);
    position:fixed;top:0;right:-260px;width:240px;height:100vh;
    padding:70px 20px 40px;z-index:999;transition:right 0.4s ease;gap:4px;
  }
  nav ul.open{right:0;}
  nav ul li a{font-size:15px;padding:10px 16px;display:block;}
  nav ul .fa-solid{position:absolute;top:20px;right:20px;display:block !important;}
  nav .fa-bars{display:block;}
  .page-header{padding:48px 0 32px;}
  .page-header h1{font-size:28px;}
  .TableauWrapper img{height:280px;}
}
</style>
</head>
<body>

<nav>
  <img src="images/patient_survey.png" alt="Patient Survey Analysis" class="logo">
  <ul id="sidemenu">
    <li><a href="index.html#header">Home</a></li>
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#projects">Projects</a></li>
    <li><a href="index.html#contact">Contact</a></li>
    <i class="fa-solid fa-circle-xmark" onclick="closemenu()"></i>
  </ul>
  <i class="fa-solid fa-bars" onclick="openmenu()"></i>
</nav>

<div class="container">

  <div class="page-header">
    <div class="section-label">Project Dashboard</div>
    <h1>Patient Survey Analysis</h1>
    <div class="hint-badge">
      <i class="fas fa-hand-pointer"></i>
      Click the dashboard to open the interactive Power BI report
    </div>
  </div>

  <div class="section-divider"></div>

  <div class="TableauWrapper">
    <a href="https://app.powerbi.com/links/eufmiJF1kk?ctid=4534a0c7-6a84-4c54-b54c-d8d63521116e&pbi_source=linkShare&bookmarkGuid=27c303b7-bf54-42a8-8ade-e0ba82bed33b" target="_blank">
      <img src="images/Patient_survey_dashboard.png" alt="Patient Survey Power BI Dashboard Preview">
    </a>
    <div class="dashboard-cta">
      <i class="fas fa-external-link-alt"></i>
      Click to open interactive Power BI dashboard
    </div>
  </div>

  <a href="more_projects.html" class="btn-back"><i class="fas fa-arrow-left" style="margin-right:8px;"></i> Back to Projects</a>

</div>

<script>
var sidemenu = document.getElementById("sidemenu");
function openmenu(){ sidemenu.classList.add("open"); }
function closemenu(){ sidemenu.classList.remove("open"); }
</script>

</body>
</html>
